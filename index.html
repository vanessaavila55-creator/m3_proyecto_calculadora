<script>
    let resultado = Number(prompt("Ingrese el primer número"));
    let opcion;
    const sumar = (a, b) => a + b;
    const restar = (a, b) => a - b;
    const multiplicar = (a, b) => a * b;
    const dividir = (a, b) => a / b;

    do {
        opcion = menu(resultado);

        if (opcion >= 1 && opcion <= 4) {
            let numero = Number(prompt("Ingrese un número"));

            switch (opcion) {
                case 1:
                    resultado = sumar(resultado,numero);
                    break;
                case 2:
                    resultado = restar(resultado, numero);
                    break;
                case 3:
                    resultado = multiplicar(resultado, numero);
                    break;
                case 4:
                    if (numero === 0) {
                        console.log("No se puede dividir por 0");
                    } else {
                        resultado = dividir(resultado, numero);
                    }
                    break;
            }
            console.log(`Resultado: ${resultado}`);
        } else {
            console.log('Opción inválida');
        }
    } while (opcion !== 5);

    console.log(`Resultado final: ${resultado}`);

    function menu(resultado) {
        return Number(prompt(`
        Resultado actual: ${resultado}
        1. Sumar
        2. Restar
        3. Multiplicar
        4. Dividir
        5. Salir
        `));
    }
</script>
