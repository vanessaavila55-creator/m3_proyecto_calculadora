<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/code.js" defer></script>
</head>

<body>
    <div class="calculadora">
        <div class="superior">
            <div class="pantalla" id="pantalla">
                0
            </div>
            <div class="botonC">
                <button class="borrar" id="btnBorrar" onclick="borrar()">C</button>
            </div>

        </div>
        <div class="botones">

            <button class="numero" id="btn7" onclick="insertar('7')">7</button>
            <button class="numero" id="btn8" onclick="insertar('8')">8</button>
            <button class="numero" id="btn9" onclick="insertar('9')">9</button>
            <button class="operador" id="btnDivision" onclick="insertar('/')">÷</button>

            <button class="numero" id="btn4" onclick="insertar('4')">4</button>
            <button class="numero" id="btn5" onclick="insertar('5')">5</button>
            <button class="numero" id="btn6" onclick="insertar('6')">6</button>
            <button class="operador" id="btnMultiplicar" onclick="insertar('*')">x</button>

            <button class="numero" id="btn1" onclick="insertar('1')">1</button>
            <button class="numero" id="btn2" onclick="insertar('2')">2</button>
            <button class="numero" id="btn3" onclick="insertar('3')">3</button>
            <button class="operador" id="btnResta" onclick="insertar('-')">-</button>

            <button class="numero" id="btnDecimal" onclick="insertar('.')">.</button>
            <button class="numero" id="btn0" onclick="insertar('0')">0</button>
            <button class="igual" id="btnIgual" onclick="calcular()">=</button>
            <button class="operador" id="btnSuma" onclick="insertar('+')">+</button>

        </div>
    </div>
    <p class="historial-info">
        📝 Haz clic sobre la pantalla para consultar las últimas 5 operaciones.
    </p>
</body>

</html>
